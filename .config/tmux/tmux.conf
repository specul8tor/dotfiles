# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1

# Status bar
set -g renumber-windows on
setw -g automatic-rename off
set -g allow-rename off
set -g status on
set -g status-position top
set -g status-interval 5

# Transparent status line with readable window labels
set -g status-style "bg=default,fg=colour250"
set -g status-left "#[bg=default,fg=colour252,bold] #S #[default]"
set -g status-right "#{?pane_in_mode,COPY ,}#{?window_zoomed_flag,ZOOM ,}%H:%M %d-%b"

set -g window-status-style "bg=default,fg=colour245"
set -g window-status-current-style "bg=default,fg=colour231,bold"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "

# Copy/scroll behavior
set -g mouse on
setw -g mode-keys vi
set -g history-limit 100000
set -g copy-command 'pbcopy'
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Autosave and restore
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-processes 'nvim opencode lazygit htop'

# TPM init (keep this at the bottom)
run '~/.config/tmux/plugins/tpm/tpm'
